# Phase 5 - Step 20: Horizontal Pod Autoscaler.
# Scales api replicas 2..6 based on average CPU vs the pod's *request* (100m).
# Requires metrics-server in the cluster (setup script installs it).
#
# Watch it react:  kubectl -n novabot get hpa -w
# Generate load:   hey -z 60s -c 20 http://localhost:8080/healthz   (after port-forward)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: novabot-api
  namespace: novabot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: novabot-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70     # scale up when avg CPU > 70% of request
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60   # don't flap: wait 60s before scaling down
