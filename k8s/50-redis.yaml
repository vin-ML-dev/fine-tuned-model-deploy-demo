# Phase 6 - Step 25: Redis for response caching + shared rate limiting.
#
# Single replica, no persistence (emptyDir): a cache is disposable by
# definition - if the pod dies, we just repopulate. (For durable Redis
# you'd use a StatefulSet + PVC; unnecessary here.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: novabot
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          # LRU eviction: when full, drop least-recently-used keys -
          # exactly the right behavior for a cache.
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "160Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: novabot
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
