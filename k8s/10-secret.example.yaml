# Phase 5 - Secret template: RunPod engine credentials.
# DO NOT put real values in git. Two options:
#
# Option A (recommended) - create directly from the CLI:
#   kubectl -n novabot create secret generic engine-credentials \
#     --from-literal=ENGINE_BASE_URL='https://api.runpod.ai/v2/YOUR_ENDPOINT_ID/openai/v1' \
#     --from-literal=ENGINE_API_KEY='rpa_your_key'
#
# Option B - copy this file to k8s/10-secret.yaml (gitignored), fill values,
#   then: kubectl apply -f k8s/10-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: engine-credentials
  namespace: novabot
type: Opaque
stringData:
  ENGINE_BASE_URL: "https://api.runpod.ai/v2/YOUR_ENDPOINT_ID/openai/v1"
  ENGINE_API_KEY: "rpa_your_runpod_api_key"
