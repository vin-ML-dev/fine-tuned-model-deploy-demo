# Phase 7 - Steps 29/30: Prometheus (metrics + alert rules) and Grafana
# (dashboard), both in-cluster. Minimal-but-real setup:
#  - Prometheus discovers api pods via the Kubernetes API (RBAC below)
#  - Alert rules evaluated by Prometheus (view under /alerts);
#    Alertmanager routing (Slack/email) is a cloud-phase addition
#  - Grafana auto-provisioned with the Prometheus datasource + a dashboard
#
# Access after apply:
#   kubectl -n novabot port-forward svc/prometheus 9090:9090   -> http://localhost:9090
#   kubectl -n novabot port-forward svc/grafana 3000:3000      -> http://localhost:3000 (admin/admin)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: novabot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-novabot
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-novabot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-novabot
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: novabot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: novabot
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules.yml
    scrape_configs:
      - job_name: novabot-api
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [novabot]
        relabel_configs:
          # keep only endpoints of the novabot-api service
          - source_labels: [__meta_kubernetes_service_name]
            regex: novabot-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
  rules.yml: |
    groups:
      - name: novabot-alerts
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(novabot_http_requests_total{status=~"5.."}[5m]))
                / sum(rate(novabot_http_requests_total[5m])) > 0.05
            for: 5m
            labels: {severity: page}
            annotations:
              summary: ">5% of requests are 5xx for 5 minutes"
          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum(rate(novabot_chat_latency_seconds_bucket{cached="false"}[5m])) by (le)
              ) > 10
            for: 10m
            labels: {severity: warn}
            annotations:
              summary: "p95 uncached chat latency above 10s"
          - alert: ApiDown
            expr: up{job="novabot-api"} == 0
            for: 2m
            labels: {severity: page}
            annotations:
              summary: "An api pod is not scrapeable"
          - alert: NegativeFeedbackSpike
            expr: |
              sum(rate(novabot_feedback_total{rating="down"}[30m]))
                > 2 * sum(rate(novabot_feedback_total{rating="down"}[6h] offset 6h))
            for: 30m
            labels: {severity: warn}
            annotations:
              summary: "Thumbs-down rate doubled vs baseline (model quality signal)"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: novabot
  labels: {app: prometheus}
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=2d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: novabot
spec:
  selector: {app: prometheus}
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: novabot
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: novabot
        folder: NovaBot
        type: file
        options:
          path: /var/lib/grafana/dashboards
  novabot-dashboard.json: |
    {
      "title": "NovaBot Overview",
      "uid": "novabot",
      "timezone": "browser",
      "refresh": "10s",
      "panels": [
        {"id": 1, "title": "Request rate (req/s) by status", "type": "timeseries",
         "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
         "targets": [{"expr": "sum(rate(novabot_http_requests_total[1m])) by (status)"}]},
        {"id": 2, "title": "Chat p95 latency (s)", "type": "timeseries",
         "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
         "targets": [{"expr": "histogram_quantile(0.95, sum(rate(novabot_chat_latency_seconds_bucket[5m])) by (le, cached))", "legendFormat": "cached={{cached}}"}]},
        {"id": 3, "title": "Cache hit ratio", "type": "timeseries",
         "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8},
         "targets": [{"expr": "sum(rate(novabot_chat_requests_total{cached=\"true\"}[5m])) / sum(rate(novabot_chat_requests_total[5m]))"}]},
        {"id": 4, "title": "Traffic by variant (A/B)", "type": "timeseries",
         "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8},
         "targets": [{"expr": "sum(rate(novabot_chat_requests_total[5m])) by (variant)"}]},
        {"id": 5, "title": "Feedback (up vs down)", "type": "timeseries",
         "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
         "targets": [{"expr": "sum(rate(novabot_feedback_total[15m])) by (rating)"}]},
        {"id": 6, "title": "Answer length p50 (chars) - drift signal", "type": "timeseries",
         "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
         "targets": [{"expr": "histogram_quantile(0.5, sum(rate(novabot_answer_chars_bucket[15m])) by (le, variant))", "legendFormat": "variant={{variant}}"}]},
        {"id": 7, "title": "Busy rejections (503 backpressure)", "type": "timeseries",
         "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
         "targets": [{"expr": "sum(rate(novabot_chat_requests_total{status=\"busy\"}[5m]))"}]}
      ],
      "schemaVersion": 39
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: novabot
  labels: {app: grafana}
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"          # local learning only - secret in cloud
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: provisioning
              mountPath: /var/lib/grafana/dashboards/novabot-dashboard.json
              subPath: novabot-dashboard.json
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 300m, memory: 256Mi}
      volumes:
        - name: provisioning
          configMap: {name: grafana-provisioning}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: novabot
spec:
  selector: {app: grafana}
  ports:
    - port: 3000
      targetPort: 3000
